---
- job:
    name: "API-Tests-RestAssured"
    description: "Запуск API автотестов"
    project-type: pipeline
    pipeline-scm:
      scm:
        - git:
            url: "https://github.com/dimamoryk/RestAssuredAutoTest.git"
            branch: "main"
            credentials-id: "github-credentials"
      script-path: "Jenkinsfile"
    parameters:
      - string:
          name: "WIREMOCK_URL"
          default: "http://wiremock_server:8080"
          description: "Wiremock URL for stubs"
    triggers:
      - pollscm: "H/30 * * * *"