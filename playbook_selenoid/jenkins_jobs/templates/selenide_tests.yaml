---
- job:
    name: "Selenide-Tests"
    description: "Запуск UI автотестов с Selenide"
    project-type: pipeline
    pipeline-scm:
      scm:
        - git:
            url: "https://github.com/dimamoryk/AutoTestWithSelenide.git"
            branch: "main"
            credentials-id: "github-credentials"
      script-path: "Jenkinsfile"
    parameters:
      - string:
          name: "BROWSER"
          default: "chrome"
          description: "Браузер для тестов"
    triggers:
      - pollscm: "H/15 * * * *"