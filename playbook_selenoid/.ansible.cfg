[defaults]
inventory = playbook_selenoid/hosts
remote_user = dima
retry_files_enabled = False
log_path = /tmp/ansible.log
timeout = 60

[persistent_connection]
connect_timeout = 30
command_timeout = 30

[privilege_escalation]
become_method = sudo
become_user = root
become_flags = "-H -S -n"

[paramiko_connection]
record_host_keys = False
host_key_auto_add = True

[ssh_connection]
scp_if_sssh = True
control_path = "%(directory)s/%%h-%%r"
pipelining = True
ssh_args = "-o ControlMaster=auto -o ControlPersist=60s"
