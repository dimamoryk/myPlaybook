---
- name: Install prerequisites
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - maven
    - openjdk-21-jdk-headless
    - git

- name: Create tests directory
  file:
    path: /tmp/automation_tests
    state: directory
    mode: '0755'

- name: Clone UI tests (Selenoid)
  git:
    repo: "https://github.com/dimamoryk/AutotestWithSelenoid.git"
    dest: "/tmp/automation_tests/ui-tests"
    version: main
  ignore_errors: yes
  when: test_type == 'ui' or test_type == 'all'

- name: Clone API tests (RestAssured)
  git:
#    repo: "https://github.com/dimamoryk/RestAssuredAutoTest.git"
    repo: "https://github.com/dimamoryk/AutotestWithStubApi1.git"
    dest: "/tmp/automation_tests/api-tests"
    version: main
  ignore_errors: yes
  when: test_type == 'api' or test_type == 'all'

- name: Clone Mobile tests (Appium)
  git:
    repo: "https://github.com/dimamoryk/AutoTestWithMobileAppium.git"
    dest: "/tmp/automation_tests/mobile-tests"
    version: main
  ignore_errors: yes
  when: test_type == 'mobile' or test_type == 'all'

- name: Clone Cucumber tests
  git:
    repo: "https://github.com/dimamoryk/AutotestWithCucumber.git"
    dest: "/tmp/automation_tests/cucumber-tests"
    version: main
  ignore_errors: yes
  when: test_type == 'cucumber' or test_type == 'all'

- name: Run UI tests
  shell: |
    cd /tmp/automation_tests/ui-tests
    mvn clean test || true
  ignore_errors: yes
  when: test_type == 'ui' or test_type == 'all'

- name: Run API tests
  shell: |
    cd /tmp/automation_tests/api-tests
    mvn clean test || true
  ignore_errors: yes
  when: test_type == 'api' or test_type == 'all'

- name: Run Mobile tests
  shell: |
    cd /tmp/automation_tests/mobile-tests
    mvn clean test || true
  ignore_errors: yes
  when: test_type == 'mobile' or test_type == 'all'

- name: Run Cucumber tests
  shell: |
    cd /tmp/automation_tests/cucumber-tests
    mvn clean test || true
  ignore_errors: yes
  when: test_type == 'cucumber' or test_type == 'all'