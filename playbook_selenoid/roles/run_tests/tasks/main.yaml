---
- name: Install prerequisites
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - maven
    - openjdk-21-jdk-headless
    - git
    - npm
    - nodejs

- name: Create tests directory
  file:
    path: /tmp/automation_tests
    state: directory
    mode: '0755'

# ============================================
# UI TESTS (Selenoid)
# ============================================
- name: Clone UI tests (Selenoid)
  git:
    repo: "https://github.com/dimamoryk/AutotestWithSelenoid.git"
    dest: "/tmp/automation_tests/ui-tests"
    version: "{{ test_branch | default('main') }}"
  ignore_errors: yes
  when: test_type == 'ui' or test_type == 'all'

- name: Run UI tests
  shell: |
    cd /tmp/automation_tests/ui-tests
    mvn clean test || true
  ignore_errors: yes
  when: test_type == 'ui' or test_type == 'all'

