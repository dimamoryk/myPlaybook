# PLAYWRIGHT TESTS

- name: Clone Playwright tests
  git:
    repo: "https://github.com/dimamoryk/AutoTestWithPlayWright2.git"
    dest: "/tmp/automation_tests/playwright-tests"
    version: "{{ test_branch | default('main') }}"
  ignore_errors: yes
  when: test_type == 'playwright' or test_type == 'all'

- name: Install Playwright dependencies
  shell: |
    cd /tmp/automation_tests/playwright-tests
    npm install || true
    npx playwright install chromium || true
  ignore_errors: yes
  when: test_type == 'playwright' or test_type == 'all'

- name: Run Playwright tests
  shell: |
    cd /tmp/automation_tests/playwright-tests
    npm test || true
  ignore_errors: yes
  when: test_type == 'playwright' or test_type == 'all'


